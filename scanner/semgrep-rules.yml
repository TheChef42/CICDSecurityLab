rules:
  - id: cicd.download-execute-pipe-shell
    message: Downloaded content is piped directly to a shell. Verify integrity before execution.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "**/*.sh"
        - "**/*.yml"
        - "**/*.yaml"
      exclude:
        - "/scanner/semgrep-rules.yml"
    pattern-regex: '\b(curl|wget)\b[^|;\n]+\|\s*(sh|bash)\b'

  - id: cicd.github-event-context-in-shell
    message: GitHub event context is interpolated into a workflow shell command. Pass untrusted values through environment variables and quote them safely.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "**/*.yml"
        - "**/*.yaml"
      exclude:
        - "/scanner/semgrep-rules.yml"
    pattern-regex: '(?s)run:\s*\|[^\n]*(?:\n\s+[^\n]*)*\$\{\{\s*github\.event\.[^}]+\}\}'

  - id: cicd.github-actions-write-all-permissions
    message: GitHub Actions workflow grants write-all token permissions. Prefer least-privilege permissions.
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.yml"
        - "**/*.yaml"
      exclude:
        - "/scanner/semgrep-rules.yml"
    pattern-regex: '(?im)^\s*permissions:\s*write-all\s*$'

  - id: cicd.workflow-debug-env-dump
    message: Workflow or script may dump environment variables to logs. Avoid printing secrets and disable shell tracing around sensitive steps.
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.sh"
        - "**/*.yml"
        - "**/*.yaml"
      exclude:
        - "/scanner/semgrep-rules.yml"
    pattern-regex: '(?m)^\s*(-\s*)?(set\s+-x|printenv|env)\s*$'

  - id: cicd.iam-administrator-access
    message: CI/CD infrastructure grants AdministratorAccess. Use scoped IAM permissions.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "**/*.tf"
        - "**/*policy*.json"
        - "**/*.yml"
        - "**/*.yaml"
      exclude:
        - "/scanner/semgrep-rules.yml"
        - "**/metadata.json"
    pattern-regex: '\bAdministratorAccess\b'

  - id: cicd.container-image-latest-tag
    message: Container image uses the mutable latest tag. Pin images by version or digest.
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/Dockerfile"
        - "**/*.yml"
        - "**/*.yaml"
      exclude:
        - "/scanner/semgrep-rules.yml"
    pattern-regex: '(?im)^\s*(FROM\s+\S+:latest|image:\s+\S+:latest)\s*$'
